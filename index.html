<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookMate AI - Recipe App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex justify-center">

    <div class="w-full max-w-md bg-white min-h-screen shadow-2xl relative overflow-hidden">
        
        <header class="p-6 pb-2">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-gray-400 text-sm font-medium">Hello, Chef!</h1>
                    <p class="text-xl font-bold text-gray-800">What do you want to cook today?</p>
                </div>
                <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center border-2 border-white shadow-sm">
                    <i class="fa-solid fa-user-chef text-orange-500 text-xl"></i>
                </div>
            </div>

            <div class="relative group">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" placeholder="Search recipes, ingredients..." 
                    class="w-full pl-12 pr-4 py-4 bg-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all border-none">
            </div>
        </header>

        <div class="px-6 py-4 flex gap-3 overflow-x-auto no-scrollbar">
            <button class="px-6 py-2 bg-orange-500 text-white rounded-xl text-sm font-semibold shadow-lg shadow-orange-200">All</button>
            <button class="px-6 py-2 bg-white text-gray-500 rounded-xl text-sm font-semibold border border-gray-100 shadow-sm">Myanmar</button>
            <button class="px-6 py-2 bg-white text-gray-500 rounded-xl text-sm font-semibold border border-gray-100 shadow-sm">Asian</button>
            <button class="px-6 py-2 bg-white text-gray-500 rounded-xl text-sm font-semibold border border-gray-100 shadow-sm">Fast Food</button>
        </div>

        <section class="px-6 py-4">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                    <i class="fa-solid fa-fire text-orange-500"></i> Trending Recipes
                </h2>
                <a href="#" class="text-orange-500 text-sm font-bold">See all</a>
            </div>
            
            <div class="flex gap-4 overflow-x-auto no-scrollbar pb-4">
                <div class="min-w-[170px] bg-white rounded-3xl p-3 shadow-xl shadow-gray-100 border border-gray-50">
                    <img src="https://images.unsplash.com/photo-1562967962-e7e00e4952df?w=300" class="w-full h-32 object-cover rounded-2xl mb-3 shadow-md">
                    <h3 class="font-bold text-sm text-gray-800">Thai Basil Chicken</h3>
                    <div class="flex items-center justify-between mt-2">
                        <span class="text-[10px] text-gray-400"><i class="fa-regular fa-clock text-orange-500"></i> 20 min</span>
                        <span class="text-[10px] text-gray-400"><i class="fa-solid fa-star text-yellow-400"></i> 4.8</span>
                    </div>
                </div>

                <div class="min-w-[170px] bg-white rounded-3xl p-3 shadow-xl shadow-gray-100 border border-gray-50">
                    <img src="https://images.unsplash.com/photo-1612874742237-6526221588e3?w=300" class="w-full h-32 object-cover rounded-2xl mb-3 shadow-md">
                    <h3 class="font-bold text-sm text-gray-800">Spaghetti Carbonara</h3>
                    <div class="flex items-center justify-between mt-2">
                        <span class="text-[10px] text-gray-400"><i class="fa-regular fa-clock text-orange-500"></i> 25 min</span>
                        <span class="text-[10px] text-gray-400"><i class="fa-solid fa-star text-yellow-400"></i> 4.7</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="px-6 py-2 mb-20">
            <h2 class="text-lg font-bold text-gray-800 mb-4">Quick & Easy</h2>
            <div class="bg-orange-50 rounded-3xl p-4 flex items-center gap-4 border border-orange-100">
                <img src="https://images.unsplash.com/photo-1603133872833-224262b5ca0a?w=200" class="w-20 h-20 object-cover rounded-2xl shadow-sm">
                <div>
                    <h4 class="font-bold text-gray-800 text-sm">Special Fried Rice</h4>
                    <p class="text-xs text-gray-500 mt-1">Perfect for a quick dinner</p>
                    <div class="flex gap-3 mt-2">
                         <span class="text-[10px] font-bold text-orange-500 underline">Get Recipe</span>
                    </div>
                </div>
            </div>
        </section>

        <nav class="absolute bottom-0 w-full bg-white/80 backdrop-blur-md border-t border-gray-100 px-8 py-4 flex justify-between items-center rounded-t-[30px] shadow-2xl">
            <i class="fa-solid fa-house text-orange-500 text-xl"></i>
            <i class="fa-solid fa-magnifying-glass text-gray-300 text-xl"></i>
            <div class="bg-orange-500 p-3 rounded-full -mt-12 border-4 border-white shadow-lg shadow-orange-200">
                <i class="fa-solid fa-robot text-white text-xl"></i>
            </div>
            <i class="fa-solid fa-heart text-gray-300 text-xl"></i>
            <i class="fa-solid fa-user text-gray-300 text-xl"></i>
        </nav>

    </div>

</body>
</html>
